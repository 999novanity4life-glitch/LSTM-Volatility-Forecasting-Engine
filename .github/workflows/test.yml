name: Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout LSTM repo
        uses: actions/checkout@v4
        with:
          path: LSTM-Volatility-Forecasting-Engine

      - name: Checkout Market-Regime repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Market-Regime-Detection-Engine
          path: Market-Regime-Detection-Engine

      - name: Checkout RL-Trading repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Reinforcement-Learning-Trading-Agent
          path: Reinforcement-Learning-Trading-Agent

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas torch scikit-learn hmmlearn joblib yfinance matplotlib seaborn

      - name: Run tests
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          cd LSTM-Volatility-Forecasting-Engine
          python -m pytest tests/ -v --tb=short
